name: CI

on:
  push:
    branches:
      - master
      - v1.1
  pull_request:
    branches:
      - "*"

permissions: {}

jobs:
  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false

  ruby-versions:
    permissions: {}
    uses: ruby/actions/.github/workflows/ruby_versions.yml@master # zizmor: ignore[unpinned-uses] -- trusted ruby-org reusable workflow; @master required to keep the Ruby version matrix current
    with:
      engine: cruby-jruby
      min_version: 3.3

  test:
    needs: ruby-versions
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
        ruby: ${{ fromJson(needs.ruby-versions.outputs.versions) }}

    name: >-
      ${{matrix.os}}:ruby-${{matrix.ruby}}
    runs-on: ${{matrix.os}}-latest
    continue-on-error: ${{matrix.ruby == 'head' || matrix.ruby == 'jruby'}}

    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up ruby and bundle
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{matrix.ruby}}
          bundler-cache: true

      - name: Run rake
        run: |
          bundle exec rake

  ci-pass:
    if: always()
    needs: test
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            exit 1
          fi
