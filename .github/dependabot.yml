version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "automerge"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "v1.1"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "automerge"
    groups:
      github-actions:
        patterns:
          - "*"
